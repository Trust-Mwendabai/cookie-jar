<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSA CTF - Restricted Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 100px; }
        .box { border: 1px solid #444; padding: 40px; display: inline-block; background: #1e1e1e; border-radius: 8px; }
        .status-red { color: #ff5555; font-weight: bold; }
        .status-green { color: #50fa7b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Corporate Management Portal</h2>
        <p>Current Role: <span id="role-text" class="status-red">Guest</span></p>
        <div id="display-area">
            <p>Error: Flag is encrypted. Only <b>admin</b> session tokens can decrypt the local buffer.</p>
        </div>
    </div>

    <script>
        // Setting the initial trap
        if (!document.cookie.includes("user_role=")) {
            document.cookie = "user_role=guest; path=/";
        }
        const secretBuffer = "Q1NBe2Nvb2tpZXNfYXJlX25vdF9zZWN1cmV9";
        function checkSession() {
            const cookies = document.cookie.split(';');
            let role = "guest";

            for (let c of cookies) {
                let [name, value] = c.trim().split('=');
                if (name === "user_role") {
                    role = value;
                }
            }

            if (role === "admin") {
                document.getElementById('role-text').innerText = "Administrator";
                document.getElementById('role-text').className = "status-green";
                
                // Only decode and show if the cookie matches 'admin'
                const decodedFlag = atob(secretBuffer);
                document.getElementById('display-area').innerHTML = `
                    <p style="color: #f1fa8c;">Authentication Successful!</p>
                    <p>Flag: <code>${decodedFlag}</code></p>
                `;
            }
        }

        // Run the check
        window.onload = checkSession;
    </script>
</body>
</html>
