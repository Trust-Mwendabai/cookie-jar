<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSA CTF - Restricted Portal</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .container { border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 10px; }
        .status-red { color: #ff5555; }
        .status-green { color: #50fa7b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Member Portal</h1>
        <p>User: <span id="user-display">Guest</span></p>
        <p>Status: <strong id="status-display" class="status-red">Standard</strong></p>
        <hr>
        <div id="flag-zone">
            <p>Access Denied: Admin session cookie required to decrypt local flag buffer.</p>
        </div>
    </div>

    <script>
        if (!document.cookie.includes("user_role=")) { document.cookie = "user_role=guest; path=/"; } const enc = "Q1NBe2Nvb2tpZXNfYXJlX25vdF9zZWN1cmV9";
        function checkAccess() {
            const cookies = document.cookie.split(';');
            let role = "guest";

            for (let c of cookies) {
                let [name, value] = c.trim().split('=');
                if (name === "user_role") { role = value; }
            }
            if (role === "admin") {
                document.getElementById('user-display').innerText = "Administrator";
                document.getElementById('status-display').innerText = "Full Access";
                document.getElementById('status-display').className = "status-green";
                
                // Decode and render ONLY if role is admin
                const flag = atob(enc); 
                document.getElementById('flag-zone').innerHTML = `Access Granted: <b>${flag}</b>`;
            }
        }

        window.onload = checkAccess;
    </script>
</body>
</html>
