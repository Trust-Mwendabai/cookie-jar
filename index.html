<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSA CTF - The Cookie Jar</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .container { border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 10px; }
        .hidden { display: none; color: #ff00ea; font-weight: bold; font-size: 1.2em; }
        .hint { color: #888; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Member Portal</h1>
        <div id="content">
            <p>Welcome, <span id="user-display">Guest</span>!</p>
            <p>Status: <strong id="status-display">Standard User</strong></p>
            <hr>
            <div id="flag-zone">
                <p>Access Denied: Only the <strong>admin</strong> can see the flag.</p>
            </div>
        </div>
    </div>

    <p class="hint">Hint: Check how the server (or in this case, the script) knows who you are. Is it written down somewhere?</p>

    <script>
        // Check if cookie exists, if not, set it to guest
        if (!document.cookie.includes("user_role=")) {
            document.cookie = "user_role=guest; path=/";
        }

        function checkAccess() {
            const cookies = document.cookie.split(';');
            let isAdmin = false;

            for (let cookie of cookies) {
                if (cookie.trim() === "user_role=admin") {
                    isAdmin = true;
                    break;
                }
            }

            if (isAdmin) {
                document.getElementById('user-display').innerText = "Administrator";
                document.getElementById('status-display').innerText = "Full Access";
                document.getElementById('flag-zone').innerHTML = 
                    `<p>Access Granted! Here is your flag:</p>
                     <p class="flag">CSA{cookies_are_not_secure}</p>`;
            }
        }

        // Run check on load
        window.onload = checkAccess;
    </script>
</body>
</html>
